<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flashcard Trainer</title>

<style>
body {
   font-family: Arial;
   text-align: center;
   padding: 20px;
}

.card {
   border: 2px solid black;
   padding: 20px;
   margin: 20px auto;
   width: 60%;
   min-height: 120px;
   font-size: 24px;
}

button {
   padding: 10px 20px;
   margin: 5px;
   font-size: 16px;
}

#wrongPanel {
   margin-top: 30px;
   border-top: 2px solid gray;
   padding-top: 15px;
}
</style>

</head>

<body>

<h1>Flashcard Trainer</h1>

<input type="file" id="fileInput">

<div class="card" id="wordBox">
Ladda en TXT-fil för att börja
</div>

<div>

<button onclick="showAnswer()">Visa svar</button>

<button onclick="markCorrect()">
✅ Rätt
</button>

<button onclick="markWrong()">
❌ Fel
</button>

<button onclick="showWrongPanel()">
Visa fel-lista
</button>

<button onclick="nextCard()">
Nästa
</button>

</div>

<div id="wrongPanel" style="display:none;">

<h2>Fel ord</h2>

<div id="wrongList"></div>

</div>

<script>

let cards = []
let wrongCards = []
let currentIndex = 0
let showingAnswer = false

document
.getElementById("fileInput")
.addEventListener("change", loadFile)

function loadFile(event) {

let file = event.target.files[0]

let reader = new FileReader()

reader.onload = function(e) {

let text = e.target.result

parseCards(text)

nextCard()

}

reader.readAsText(file)

}

function parseCards(text) {

cards = []

let lines = text.split("\n")

for (let line of lines) {

if (
line.startsWith("#")
|| line.trim() === ""
)
continue

let parts = line.split("\t")

if (parts.length >= 2) {

let word = parts[0]

let meaning = parts[1]

cards.push({
word: word,
meaning: meaning
})

}

}

shuffle(cards)

}

function shuffle(array) {

for (let i = array.length - 1; i > 0; i--) {

let j = Math.floor(Math.random() * (i + 1))

[array[i], array[j]] =
[array[j], array[i]]

}

}

function nextCard() {

if (cards.length === 0) return

currentIndex =
Math.floor(Math.random() * cards.length)

showingAnswer = false

document
.getElementById("wordBox")
.innerHTML =
cards[currentIndex].word

}

function showAnswer() {

if (showingAnswer) return

document
.getElementById("wordBox")
.innerHTML =
cards[currentIndex].meaning

showingAnswer = true

}

function markCorrect() {

nextCard()

}

function markWrong() {

wrongCards.push(
cards[currentIndex]
)

updateWrongList()

nextCard()

}

function showWrongPanel() {

let panel =
document.getElementById("wrongPanel")

panel.style.display =
panel.style.display === "none"
? "block"
: "none"

}

function updateWrongList() {

let list =
document.getElementById("wrongList")

list.innerHTML = ""

for (let card of wrongCards) {

let div =
document.createElement("div")

div.innerHTML =
"<b>" +
card.word +
"</b> – " +
card.meaning

list.appendChild(div)

}

}

</script>

</body>
</html>
