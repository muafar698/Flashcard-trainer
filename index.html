<script>

var LS_WRONG='ff_wrong_words';
var LS_PROGRESS='ff_progress';

var allCards=[];
var deck=[];
var currentIndex=0;

var wrongWords=new Set();
var savedWrong=new Set();

var correctCount=0;
var revealed=false;
var mode='all';

/* STORAGE */

function lsGet(k){
try{return localStorage.getItem(k)}
catch(e){return null}
}

function lsSet(k,v){
try{localStorage.setItem(k,v)}
catch(e){}
}

function lsDel(k){
try{localStorage.removeItem(k)}
catch(e){}
}

/* LOAD SAVED */

function loadSavedWrong(){

var r=lsGet(LS_WRONG);

if(!r) return new Set();

try{
return new Set(JSON.parse(r));
}catch(e){
return new Set();
}

}

function persistSavedWrong(){

lsSet(
LS_WRONG,
JSON.stringify([...savedWrong])
);

updateHeaderBadge();
updateSavedModeBtn();
updateWrongPanel();
updateStats();
showUploadSavedBanner();

}

/* PROGRESS */

function saveProgress(){

if(!deck.length) return;

lsSet(
LS_PROGRESS,
JSON.stringify({
index:currentIndex,
correct:correctCount,
mode:mode
})
);

}

function loadProgress(){

var r=lsGet(LS_PROGRESS);

if(!r) return null;

try{
return JSON.parse(r);
}catch(e){
return null;
}

}

/* INIT */

savedWrong=loadSavedWrong();

updateHeaderBadge();
showUploadSavedBanner();

/* FILE */

function loadFile(file){

var reader=new FileReader();

reader.onload=function(e){

var cards=parseAnkiTxt(e.target.result);

if(!cards.length){

showToast('No cards found.');

return;

}

allCards=cards;

startSession();

showToast(
'Loaded '+cards.length+' cards'
);

};

reader.readAsText(file,'UTF-8');

}

/* SESSION */

function startSession(){

correctCount=0;
wrongWords.clear();

deck=shuffle(allCards.slice());

currentIndex=0;

document
.getElementById('upload-screen')
.classList.add('hidden');

document
.getElementById('study-screen')
.classList.remove('hidden');

document
.getElementById('newDeckBtn')
.classList.remove('hidden');

var prog=loadProgress();

if(
prog &&
prog.index<deck.length
){

currentIndex=prog.index||0;
correctCount=prog.correct||0;

if(prog.mode)
mode=prog.mode;

}

updateModeButtons(mode);
updateSavedModeBtn();
updateStats();
updateWrongPanel();

loadCard();

}

/* CARD */

function loadCard(){

if(currentIndex>=deck.length){

showComplete();

return;

}

revealed=false;

var card=deck[currentIndex];

document
.getElementById('cardInner')
.classList.remove('flipped');

document
.getElementById('cardWord')
.textContent=card.word;

document
.getElementById('cardBackWord')
.textContent=card.word;

document
.getElementById('cardDefinition')
.innerHTML=card.definition;

var tag=
document.getElementById('cardSavedTag');

if(savedWrong.has(card.word))
tag.classList.remove('hidden');
else
tag.classList.add('hidden');

document
.getElementById('revealActions')
.classList.remove('hidden');

document
.getElementById('judgeActions')
.classList.add('hidden');

saveProgress();

updateStats();

}

/* REVEAL */

function revealCard(){

if(revealed) return;

revealed=true;

document
.getElementById('cardInner')
.classList.add('flipped');

document
.getElementById('revealActions')
.classList.add('hidden');

document
.getElementById('judgeActions')
.classList.remove('hidden');

}

/* MARK */

function markCorrect(){

if(!revealed) return;

var card=deck[currentIndex];

correctCount++;

if(mode==='saved'){

savedWrong.delete(card.word);

persistSavedWrong();

showToast(
'Removed from saved',
'correct'
);

}

currentIndex++;

saveProgress();

updateStats();

loadCard();

}

function markWrong(){

if(!revealed) return;

var card=deck[currentIndex];

wrongWords.add(card.word);

var isNew=
!savedWrong.has(card.word);

savedWrong.add(card.word);

persistSavedWrong();

if(isNew)
showToast(
'Saved to wrong list',
'saved'
);
else
showToast(
'Already saved',
'wrong'
);

currentIndex++;

saveProgress();

loadCard();

}

/* MODE */

function setMode(m){

if(
m==='wrong' &&
!wrongWords.size
){
showToast('No wrong words');
return;
}

if(
m==='saved' &&
!savedWrong.size
){
showToast('No saved words');
return;
}

mode=m;

if(m==='wrong')
deck=shuffle(
allCards.filter(
c=>wrongWords.has(c.word)
)
);

else if(m==='saved')
deck=shuffle(
allCards.filter(
c=>savedWrong.has(c.word)
)
);

else
deck=shuffle(allCards.slice());

currentIndex=0;

updateModeButtons(m);

updateStats();

loadCard();

}

/* CLEAR */

function clearSavedWrong(){

if(!savedWrong.size){

showToast('Nothing to clear');

return;

}

if(
!confirm(
'Clear saved wrong cards?'
)
) return;

savedWrong.clear();

persistSavedWrong();

showToast(
'Cleared saved words'
);

}

/* COMPLETE */

function showComplete(){

document
.getElementById('study-screen')
.classList.add('hidden');

document
.getElementById('complete-screen')
.classList.remove('hidden');

var pct=
Math.round(
(correctCount/deck.length)*100
);

document
.getElementById('completeText')
.textContent=
'You got '+
correctCount+
' of '+
deck.length+
' correct ('+
pct+
'%).';

lsDel(LS_PROGRESS);

}

/* SHUFFLE */

function shuffle(arr){

for(
var i=arr.length-1;
i>0;
i--
){

var j=
Math.floor(
Math.random()*(i+1)
);

var t=arr[i];

arr[i]=arr[j];

arr[j]=t;

}

return arr;

}

</script>
